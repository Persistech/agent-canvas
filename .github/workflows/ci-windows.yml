name: CI (Windows)

# Smoke-build the frontend on Windows after every push to `main`, plus on
# manual dispatch. This was previously a matrix entry inside `ci.yml`, but
# expressing "Windows on main only" via the matrix caused GitHub's strict
# ruleset to keep a phantom `test-and-build (windows)` expected check on
# every PR — see the AGENTS.md notes and PR #916. Moving Windows into its
# own workflow that does not trigger on `pull_request` removes that
# expectation cleanly while preserving the same main-branch coverage.
#
# Only the cross-platform-sensitive steps run here (install, test, build).
# Lint, library build, and `npm pack --dry-run` are intentionally omitted
# — they are not OS-dependent and are already covered by the ubuntu job.

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-windows-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-and-build:
    name: test-and-build (windows)
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js with npm cache
        uses: actions/setup-node@v6
        with:
          # Pin to 24.15.x — Node 24.16.0 has a zip-extraction regression
          # (nodejs/node#63487) that hangs `playwright install` for Playwright
          # < 1.60.0. Remove this pin after upgrading to Playwright >= 1.60.0.
          node-version: "24.15"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build app
        run: npm run build
