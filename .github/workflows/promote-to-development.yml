---
# Promotes each successful main build's Agent Canvas image to the development
# environment (https://canvas.dev.all-hands.dev) by dispatching to
# OpenHands/saas-deploy, which updates the Agent Canvas image tag in
# app/openhands/environments/development/version.yaml. Runs after the Docker
# workflow succeeds on main; can also be run manually to re-promote a known-good
# image tag.

name: Promote to development

on:
  workflow_dispatch:
    inputs:
      image-tag:
        description: "Image tag to promote (defaults to sha-<short SHA> for the selected ref)"
        required: false
        type: string
      source-sha:
        description: "Source commit SHA for provenance (defaults to the selected ref, or the sha-* image tag when provided)"
        required: false
        type: string
  workflow_run:
    workflows: ["Docker"]
    types: [completed]
    branches: [main]

# Queue promotions so an earlier main commit deploys before a later one.
concurrency:
  group: promote-to-development-agent-canvas
  cancel-in-progress: false

jobs:
  promote:
    # Only promote when the Docker build actually succeeded, or when run
    # manually. Requiring a push event also prevents a fork PR whose head branch
    # is named "main" from passing the workflow_run branch filter.
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: dev-deploy
    permissions:
      contents: read
    steps:
      - name: Compute promotion metadata
        id: promotion
        # Matches the seven-character sha-* tags emitted by docker.yml.
        env:
          DISPATCH_IMAGE_TAG: ${{ github.event.inputs['image-tag'] }}
          DISPATCH_SOURCE_SHA: ${{ github.event.inputs['source-sha'] }}
          SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          image_tag="${DISPATCH_IMAGE_TAG:-sha-${SHA::7}}"
          source_sha="$SHA"

          if [ -n "$DISPATCH_SOURCE_SHA" ]; then
            source_sha="$DISPATCH_SOURCE_SHA"
          elif [[ -n "$DISPATCH_IMAGE_TAG" && "$DISPATCH_IMAGE_TAG" =~ ^sha-([0-9a-f]{7,40})$ ]]; then
            source_sha="${BASH_REMATCH[1]}"
          fi

          if ! [[ "$source_sha" =~ ^[0-9a-f]{7,40}$ ]]; then
            echo "::error title=Invalid source SHA::source-sha must be a 7-40 character lowercase hexadecimal commit SHA."
            exit 1
          fi

          echo "tag=$image_tag" >> "$GITHUB_OUTPUT"
          echo "source-sha=$source_sha" >> "$GITHUB_OUTPUT"

      - name: Mint token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.SAAS_DEPLOY_DISPATCHER_APP_ID }}
          private-key: ${{ secrets.SAAS_DEPLOY_DISPATCHER_APP_PRIVATE_KEY }}
          owner: OpenHands
          repositories: saas-deploy
          permission-contents: write

      - name: Dispatch promotion to saas-deploy
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          IMAGE_TAG: ${{ steps.promotion.outputs.tag }}
          SOURCE_SHA: ${{ steps.promotion.outputs['source-sha'] }}
        run: |
          gh api /repos/OpenHands/saas-deploy/dispatches \
            -f event_type=promote-to-development \
            -F client_payload[release]=openhands \
            -F client_payload[tag-path]=.openhands.agent-canvas.image.tag \
            -F client_payload[image-tag]="$IMAGE_TAG" \
            -F client_payload[source-repo]="$GITHUB_REPOSITORY" \
            -F client_payload[source-sha]="$SOURCE_SHA"
          echo "Dispatched promote-to-development for Agent Canvas ${IMAGE_TAG} (${SOURCE_SHA})."

      - name: Annotate dispatch failure
        if: ${{ failure() }}
        env:
          IMAGE_TAG: ${{ steps.promotion.outputs.tag }}
          HEAD_SHA: ${{ steps.promotion.outputs['source-sha'] || github.event.workflow_run.head_sha || github.sha }}
          SOURCE_RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          image_tag="${IMAGE_TAG:-sha-${HEAD_SHA::7}}"
          source="${SOURCE_RUN_URL:-manual workflow_dispatch run}"
          echo "::error title=Promote to development failed::Failed to dispatch promotion of Agent Canvas ${image_tag} (${HEAD_SHA}) to development. Source: ${source}"
